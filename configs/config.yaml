experiment:
  name: srd_net_multimodal_ultrasound
  seed: 2026
  device: cuda
  output_dir: outputs/srd_net

data:
  image_size: 224
  train:
    manifest: data/manifests/train_manifest.csv
  val:
    manifest: data/manifests/val_manifest.csv
  test:
    manifest: data/manifests/test_manifest.csv

model:
  backbone_name: swin_tiny_patch4_window7_224
  pretrained_backbone: false
  fusion_channels: [96, 192, 384, 768]
  decoder_channels: [384, 192, 96]
  classifier_hidden_dim: 256
  dropout: 0.2

loss:
  segmentation_weight: 1.0
  classification_weight: 1.0

training:
  epochs: 100
  batch_size: 4
  num_workers: 4
  learning_rate: 0.0001
  min_learning_rate: 0.000001
  weight_decay: 0.0001

inference:
  classification_threshold: 0.5
